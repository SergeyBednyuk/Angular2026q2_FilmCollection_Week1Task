<a [routerLink]="['/films', film().id]">
	<article>
		<img [src]="film().posterUrl" [alt]="film().title">
		<h3>{{ film().title }}</h3>
		<p>{{ film().year }} · {{ film().genre }}</p>
		<p>Rating: {{ film().rating }}</p>
		<p>{{ film().duration }} min (TODO custom pipe)</p>
		<p>{{ film().description }}</p>
	</article>
</a>
